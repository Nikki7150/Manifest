<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Manifest</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Manifest</h1>

        <div id="CanvasToolBar">
            <button id="AddTextButton">Add Text</button>
            <button id="UploadImageButton">Upload</button>
            <button id="DeleteObject">Delete</button>
            <button id="DownloadBoard">Download</button>
            <input type="file" id="ImageUploadInput" accept="image/*" hidden />
            <button id="BringForward">Bring Forward</button>
            <button id="SendBackward">Send Backward</button>
        </div>

        <div id="BoardWrapper">
            <canvas id="VisionBoard"></canvas>
        </div>

        <div id="ItemsToolBar">
            <button id="StickersButton">Stickers</button>
            <button id="DecorButton">Decor</button>
            <button id="FramesButton">Frames</button>
        </div>

        <div id="stickersModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Stickers</h2>
                <div id="stickerContainer" class="sticker-container">
                    <img src="assets/stickers/kiss.png" class="sticker" alt="Sticker 1">
                    <img src="assets/stickers/Screenshot 2026-04-06 at 2.39.56 PM.png" class="sticker" alt="Sticker 2">
                </div>
            </div>
        </div>

        <div id="decorModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Decor</h2>
                <div id="decorContainer" class="decor-container">
                    <img src="assets/decor/bow.png" class="decor" alt="Decor 1">
                </div>
            </div>
        </div>

        <div id="framesModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Frames</h2>
                <div id="frameContainer" class="frame-container">
                    <img src="assets/frames/headphones.png" class="frame" alt="Frame 1">
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
