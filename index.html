<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Manifest</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Manifest</h1>

        <div id="CanvasToolBar">
            <button id="AddTextButton">Add Text</button>
            <button id="UploadImageButton">Upload</button>
            <button id="DeleteObject">Delete</button>
            <button id="DownloadBoard">Download</button>
            <button id="ClearBoard">Clear Board</button>
            <input type="file" id="ImageUploadInput" accept="image/*" hidden />
            <button id="BringForward">Bring Forward</button>
            <button id="SendBackward">Send Backward</button>
        </div>

        <div id="BoardWrapper">
            <canvas id="VisionBoard"></canvas>
        </div>

        <img src="assets/tabs/temp-tabs.jpeg" id="TabsBackground" alt="Tabs Background">
        <div id="ItemsToolBar">
            <button id="StickersButton">Stickers</button>
            <button id="DecorButton">Decor</button>
            <button id="FramesButton">Frames</button>
        </div>

        <!-- Modals -->
        <div id="modals">
            <div id="ToolBar">
                <button id="sbtn">Stickers</button>
                <button id="dbtn">Decor</button>
                <button id="fbtn">Frames</button>
            </div>
            <div id="stickerModal" class="modal hidden">
                <div class="modal-content">
                    <span id="closeSticker" class="close">&times;</span>
                    <div id="stickerContainer" class="sticker-container">
                        <img src="assets/stickers/kiss.png" class="pre-sticker" alt="Sticker 1">
                        <img src="assets/stickers/Screenshot 2026-04-06 at 2.39.56 PM.png" class="pre-sticker" alt="Sticker 2">
                    </div>
                </div>
            </div>

            <div id="decorModal" class="modal hidden">
                <div id="modal-content">
                    <span id="closeDecor" class="close">&times;</span>
                    <div id="decorContainer" class="decor-container">
                        <img src="assets/decor/bow.png" class="pre-sticker" alt="Decor 1">
                    </div>
                </div>
            </div>

            <div id="framesModal" class="modal hidden">
                <div id="modal-content">
                    <span id="closeFrame" class="close">&times;</span>
                    <div id="frameContainer" class="frame-container">
                        <img src="assets/frames/headphones.png" class="pre-sticker" alt="Frame 1">
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
