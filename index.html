<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Manifest</title>
        <link rel="stylesheet" href="style.css">
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Bebas+Neue&family=Caveat&family=Caveat+Brush&family=Dancing+Script&family=Gochi+Hand&family=Indie+Flower&family=Inter&family=Kalam&family=Lora&family=Merriweather&family=Montserrat&family=Pacifico&family=Permanent+Marker&family=Playfair+Display&family=Playpen+Sans&family=Poppins&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    </head>
    <body>
        <h1>Manifest</h1>

        <!-- Text edit modal -->
        <div id="textEditBox" class="hidden">
            <h3>Fonts:</h3>
            <div class="content">
                <div id="fontList"></div>
                <div id="fontColor">
                    <label for="fontColor" id="colorLabel">Color:</label>
                    <input type="color" id="f-color" value="#000000">
                </div>
            </div>
        </div>

        <!-- Image edit modal -->
        <div id="imageEditBox" class="hidden">
            <div class="content">
                <div class="filter-option">
                    <label for="brightness">Brightness:</label>
                    <input type="range" id="brightness" min="-1" max="1" step="0.1" value="0">
                </div>
                <div class="filter-option">
                    <label for="contrast">Contrast:</label>
                    <input type="range" id="contrast" min="-1" max="1" step="0.1" value="0">
                </div>
                <div class="filter-option">
                    <label for="saturation">Saturation:</label>
                    <input type="range" id="saturation" min="-1" max="1" step="0.1" value="0">
                </div>
                <div class="filter-option">
                    <label for="blur">Blur:</label>
                    <input type="range" id="blur" min="0" max="10" step="0.1" value="0">
                </div>
                <div class="f-options">
                    <div class="filter-option">
                        <label for="grayScale">Grayscale</label>
                        <label class="switch">
                            <input type="checkbox" id="grayScale"/>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="filter-option">
                        <label for="sepia">Sepia</label>
                        <label class="switch">
                            <input type="checkbox" id="sepia"/>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="filter-option">
                        <label for="invert">Invert</label>
                        <label class="switch">
                            <input type="checkbox" id="invert"/>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="filter-option">
                    <button id="resetFilters">Reset</button>
                </div>
            </div>
        </div>

        <div id="CanvasToolBar">
            <button id="AddTextButton" class="toolbar-btn">Add Text</button>
            <button id="UploadImageButton" class="toolbar-btn">Upload</button>
            <button id="DeleteObject" class="toolbar-btn">Delete</button>
            <button id="DownloadBoard" class="toolbar-btn">Download</button>
            <button id="ClearBoard" class="toolbar-btn">Clear Board</button>
            <input type="file" id="ImageUploadInput" accept="image/*" hidden />
            <button id="BringForward" class="toolbar-btn">Bring Forward</button>
            <button id="SendBackward" class="toolbar-btn">Send Backward</button>
            <button id="DrawingMode">Drawing Mode</button>
            <button id="SaveBoard" class="toolbar-btn">Save Board</button>
            <button id="Undo" class="toolbar-btn">Undo</button>
            <button id="Redo" class="toolbar-btn">Redo</button>
            <button id="Duplicate" class="toolbar-btn">Duplicate</button>
            <button id="GroupObjects" class="toolbar-btn">Group</button>
            <button id="UngroupObjects" class="toolbar-btn">Ungroup</button>
        </div>

        <div id="drawingTools" class="hidden">
            <div id="toolbox">
                <input type="range" id="brushSize" min="1" max="50" value="1">
                <span id="size">1</span>
                <input type="color" id="color" />
                <button id="clear">X</button>
            </div>
        </div>
        
        <div id="BoardWrapper">
            <h4 id="AutoSave">Saved</h4>
            <button id="SettingsBtn">Settings</button>
            <canvas id="VisionBoard"></canvas>
        </div>

        <img src="assets/tabs/temp-tabs.jpeg" id="TabsBackground" alt="Tabs Background">
        <div id="ItemsToolBar">
            <button id="StickersButton" class="toolbar-btn">Stickers</button>
            <button id="DecorButton" class="toolbar-btn">Decor</button>
            <button id="FramesButton" class="toolbar-btn">Frames</button>
        </div>

        <!-- Modals -->
        <div id="modals">
            <div id="ToolBar">
                <button id="sbtn" class="toolbar-btn">Stickers</button>
                <button id="dbtn" class="toolbar-btn">Decor</button>
                <button id="fbtn" class="toolbar-btn">Frames</button>
            </div>
            <div id="stickerModal" class="modal hidden">
                <div class="modal-content">
                    <span id="closeSticker" class="close">&times;</span>
                    <div id="stickerContainer" class="sticker-container">
                        <img src="assets/stickers/kiss.png" class="pre-sticker" alt="Sticker 1">
                        <img src="assets/stickers/Screenshot 2026-04-06 at 2.39.56 PM.png" class="pre-sticker" alt="Sticker 2">
                    </div>
                </div>
            </div>

            <div id="decorModal" class="modal hidden">
                <div id="modal-content">
                    <span id="closeDecor" class="close">&times;</span>
                    <div id="decorContainer" class="decor-container">
                        <img src="assets/decor/bow.png" class="pre-sticker" alt="Decor 1">
                    </div>
                </div>
            </div>

            <div id="framesModal" class="modal hidden">
                <div id="modal-content">
                    <span id="closeFrame" class="close">&times;</span>
                    <div id="frameContainer" class="frame-container">
                        <img src="assets/frames/headphones.png" class="pre-sticker" alt="Frame 1">
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings modal -->
        <div id="settingsOverlay" class="hidden">
            <div id="settings-content">
                <h3>Settings</h3>
                <div class="setting-option">
                    <label for="board-background">Board-background:</label>
                    <div class="board-grid">
                        <div class="grid-option">
                            <div class="grid-preview" id="cork-preview">
                                <img src="assets/backgrounds/cork-board.jpg" alt="Cork Board" class="grid-image">
                            </div>
                            <label for="grid1" class="grid-label">Cork Board</label>
                        </div>
                        <div class="grid-option">
                            <div class="grid-preview" id="whiteB-preview">
                                <img src="assets/backgrounds/white-board.jpg" alt="White Board" class="grid-image">
                            </div>
                            <label for="grid2" class="grid-label">White Board</label>
                        </div>
                        <div class="grid-option">
                            <div class="grid-preview" id="grid-preview">
                                <img src="assets/backgrounds/grid-paper.jpg" alt="Grid Paper" class="grid-image">
                            </div>
                            <label for="grid3" class="grid-label">Grid Paper</label>
                        </div>
                        <div class="grid-option">
                            <div class="grid-preview" id="dotted-preview">
                                <img src="assets/backgrounds/dotted-paper.jpg" alt="Dotted Paper" class="grid-image">
                            </div>
                            <label for="grid4" class="grid-label">Dotted Paper</label>
                        </div>
                        <div class="grid-option">
                            <div class="grid-preview" id="scrapB-preview">
                                <img src="assets/backgrounds/white-scrapbook-paper.jpg" alt="Scrapbook Paper" class="grid-image">
                            </div>
                            <label for="grid5" class="grid-label">Scrapbook Paper</label>
                        </div>
                        <div class="grid-option">
                            <div class="grid-preview" id="dark-preview">
                                <img src="assets/backgrounds/dark-paper.jpg" alt="Dark Paper" class="grid-image">
                            </div>
                            <label for="grid6" class="grid-label">Dark Paper</label>
                        </div>
                    </div>
                </div>
                <!--<div class="setting-option">
                    <label for="website-background">Website-background:</label>
                    <label class="switch">
                        <input type="checkbox" id="website-background"/>
                        <span class="slider"></span>
                    </label>
                </div>-->
                <button id="closeSettings" class="close-settings">Close</button>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
